<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Chemistry Nomenclature — April 2026</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Georgia, 'Times New Roman', serif;
  background: #1a1a1a;
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── TOP BAR ── */
#topbar {
  background: #111;
  color: #fff;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  gap: 10px;
}
#topbar .title { font-size: 13px; color: #aaa; font-family: monospace; }
#slide-counter { font-size: 12px; color: #aaa; font-family: monospace; white-space: nowrap; }

/* ── PROGRESS BAR ── */
#progress-track {
  height: 5px;
  background: #333;
  flex-shrink: 0;
}
#progress-fill {
  height: 100%;
  transition: width 0.3s, background 0.4s;
}

/* ── SLIDE CONTENT ── */
#slide-content {
  flex: 1;
  overflow-y: auto;
  background: #fff;
  -webkit-overflow-scrolling: touch;
}

/* ── BOTTOM NAV ── */
#bottomnav {
  background: #111;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  gap: 10px;
}
#bottomnav button {
  padding: 10px 24px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: 700;
  font-size: 16px;
  font-family: Georgia, serif;
  transition: background 0.2s;
}
#btn-prev { background: #333; color: #fff; }
#btn-prev:disabled { background: #222; color: #555; cursor: default; }
#btn-next { color: #fff; }
#btn-next:disabled { background: #333; color: #555; cursor: default; }

/* dot row */
#dots {
  flex: 1;
  display: flex;
  justify-content: center;
  gap: 4px;
  flex-wrap: wrap;
  overflow: hidden;
  max-height: 20px;
}
.dot {
  width: 8px; height: 8px;
  border-radius: 4px;
  background: #333;
  cursor: pointer;
  transition: all 0.2s;
  flex-shrink: 0;
}
.dot.active { width: 18px; }
.dot.past { background: #666; }

/* ── SHARED SLIDE STYLES ── */
.slide { min-height: 100%; display: flex; flex-direction: column; padding: 28px 6%; }
.slide-dark { min-height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 40px 8%; }

.section-label {
  font-size: clamp(10px, 1.6vw, 14px);
  color: rgba(255,255,255,0.6);
  margin-bottom: 16px;
  font-weight: 600;
  letter-spacing: 0.04em;
  font-family: monospace;
}
.section-label-dark {
  font-size: clamp(10px, 1.6vw, 14px);
  color: #555;
  margin-bottom: 16px;
  font-weight: 600;
  letter-spacing: 0.04em;
  font-family: monospace;
  text-transform: uppercase;
}

.big { font-size: clamp(26px, 5vw, 50px); font-weight: 800; line-height: 1.15; }
.med { font-size: clamp(18px, 3vw, 32px); font-weight: 700; line-height: 1.3; }
.body-text { font-size: clamp(14px, 2.2vw, 22px); line-height: 1.6; }
.small-text { font-size: clamp(12px, 1.7vw, 18px); line-height: 1.5; }
.mono { font-family: 'Courier New', Courier, monospace; }

/* body block */
.body-block {
  background: #f8f8f8;
  border-radius: 0 12px 12px 0;
  padding: 16px 20px;
  margin-bottom: 20px;
  white-space: pre-line;
}

/* example boxes */
.example-box {
  padding: 10px 14px;
  margin-bottom: 8px;
  border-radius: 8px;
  white-space: pre-line;
}
.example-box:nth-child(odd) { background: #f0f0f0; }
.example-box:nth-child(even) { background: #e8e8e8; }

/* note block */
.note-block {
  border-radius: 0 8px 8px 0;
  padding: 12px 16px;
  margin-bottom: 16px;
  white-space: pre-line;
  background: #f8f8f8;
  color: #444;
}

/* footnote block */
.footnote-block {
  border-radius: 0 8px 8px 0;
  padding: 12px 16px;
  margin-top: 16px;
  white-space: pre-line;
  background: #fffdf0;
  color: #444;
}

/* tables */
table { width: 100%; border-collapse: collapse; font-size: clamp(12px, 1.8vw, 18px); margin-top: 8px; }
th { color: #fff; padding: 10px 12px; text-align: left; font-weight: 800; white-space: nowrap; }
td { padding: 10px 12px; border-bottom: 1px solid #eee; line-height: 1.5; white-space: pre-line; }
tr:nth-child(odd) td { background: #fff; }
tr:nth-child(even) td { background: #f5f5f5; }

/* vocab cards */
.vocab-card {
  border-radius: 14px;
  padding: 20px 22px;
  flex: 1;
  min-width: 0;
}
.vocab-row { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 14px; }

/* activity */
.display-formula {
  background: #fff;
  border: 3px dashed #ccc;
  border-radius: 14px;
  padding: 20px;
  text-align: center;
  font-size: clamp(20px, 4vw, 36px);
  font-family: monospace;
  margin-bottom: 16px;
}
.bullet-item {
  background: #fff;
  border-radius: 10px;
  padding: 12px 16px;
  margin-bottom: 8px;
  border-left: 5px solid #ccc;
  font-size: clamp(13px, 2vw, 20px);
  line-height: 1.6;
}
.instruction-text {
  font-size: clamp(12px, 1.6vw, 17px);
  color: #888;
  font-style: italic;
  margin-bottom: 16px;
  line-height: 1.5;
}

/* flashcard grid */
.flashcard-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 14px;
}
.flashcard {
  border-radius: 12px;
  padding: 16px 10px;
  cursor: pointer;
  text-align: center;
  min-height: 90px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  border: 2px solid #ddd;
  background: #f0f0f0;
  transition: all 0.2s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.flashcard.flipped { color: #fff; border-color: transparent; }
.flashcard-front { font-size: clamp(20px, 4vw, 36px); font-family: monospace; font-weight: 900; }
.flashcard-back { font-size: clamp(11px, 1.6vw, 16px); white-space: pre-line; line-height: 1.4; }
.reveal-all-btn {
  padding: 9px 20px;
  color: #fff;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: 700;
  font-size: clamp(12px, 1.6vw, 16px);
  font-family: Georgia, serif;
}

/* true/false */
.tf-card {
  border-radius: 12px;
  overflow: hidden;
  border: 2px solid #ddd;
  margin-bottom: 8px;
  cursor: pointer;
  transition: border-color 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.tf-card.correct { border-color: #40a040; }
.tf-card.wrong { border-color: #c03030; }
.tf-card-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 11px 16px;
  background: #fafafa;
}
.tf-card.correct .tf-card-header { background: #e8ffe8; }
.tf-card.wrong .tf-card-header { background: #ffe8e8; }
.tf-formula { font-family: monospace; font-weight: 900; font-size: clamp(16px, 2.5vw, 26px); flex-shrink: 0; }
.tf-claim { flex: 1; font-size: clamp(13px, 1.9vw, 20px); }
.tf-icon { font-size: clamp(16px, 2.5vw, 24px); flex-shrink: 0; }
.tf-explain {
  padding: 9px 16px;
  font-size: clamp(11px, 1.6vw, 17px);
  line-height: 1.6;
}
.tf-card.correct .tf-explain { background: #d8f8d8; color: #1a5c1a; }
.tf-card.wrong .tf-explain { background: #f8d8d8; color: #8b0000; }
.tf-intro {
  background: #f8f8f8;
  border-radius: 0 10px 10px 0;
  padding: 12px 16px;
  margin-bottom: 14px;
  white-space: pre-line;
  font-size: clamp(13px, 1.9vw, 20px);
  line-height: 1.6;
}

/* reveal list */
.reveal-item {
  border-radius: 14px;
  padding: 18px 20px;
  cursor: pointer;
  margin-bottom: 10px;
  border: 2px solid #ddd;
  background: #f0f0f0;
  transition: all 0.25s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.reveal-item.open { color: #fff; border-color: transparent; }
.reveal-label { font-weight: 800; font-family: monospace; white-space: pre-line; font-size: clamp(14px, 2vw, 22px); }
.reveal-detail { font-size: clamp(12px, 1.7vw, 19px); white-space: pre-line; line-height: 1.6; margin-top: 10px; color: rgba(255,255,255,0.92); }
.tap-hint { font-size: clamp(11px, 1.5vw, 15px); color: #aaa; margin-top: 5px; }

/* activity answers */
.ans-reveal-btn {
  padding: 8px 18px;
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 700;
  font-size: clamp(12px, 1.6vw, 16px);
  font-family: Georgia, serif;
  margin-top: 10px;
  margin-right: 8px;
}
.ans-box {
  background: #e8ffe8;
  border: 2px solid #80c080;
  border-radius: 8px;
  padding: 10px 16px;
  font-family: monospace;
  font-weight: 700;
  font-size: clamp(14px, 2vw, 22px);
  color: #1a5c1a;
  margin-top: 8px;
}

/* quiz */
.quiz-q {
  background: #fff;
  border-radius: 14px;
  padding: 16px 18px;
  border: 2px solid #ddd;
  margin-bottom: 14px;
  transition: border-color 0.2s;
}
.quiz-q.answered-correct { border-color: #40a040; }
.quiz-q.answered-wrong { border-color: #c03030; }
.quiz-q-text { font-weight: 700; font-size: clamp(13px, 1.9vw, 20px); margin-bottom: 10px; line-height: 1.4; }
.quiz-option {
  background: #f5f5f5;
  border: 1px solid #ddd;
  border-radius: 8px;
  padding: 9px 12px;
  margin-bottom: 6px;
  cursor: pointer;
  font-size: clamp(12px, 1.7vw, 18px);
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.quiz-option:last-child { margin-bottom: 0; }
.quiz-option.opt-correct { background: #d8f8d8; color: #1a5c1a; border-color: #40a040; font-weight: 700; }
.quiz-option.opt-wrong { background: #f8d8d8; color: #8b0000; border-color: #c03030; }
.quiz-explain {
  margin-top: 10px;
  background: #f8f8f8;
  border-radius: 8px;
  padding: 10px 14px;
  border-left: 3px solid #ccc;
  font-size: clamp(11px, 1.6vw, 17px);
  line-height: 1.6;
  color: #444;
}
.quiz-score {
  text-align: center;
  margin-top: 16px;
  padding: 16px;
  border-radius: 14px;
  font-size: clamp(16px, 2.5vw, 26px);
  font-weight: 700;
}
.quiz-score.perfect { background: #d8f8d8; color: #1a5c1a; }
.quiz-score.partial { background: #fff8e8; color: #7a5000; }

/* subtitle box on dark slides */
.subtitle-box {
  background: rgba(255,255,255,0.12);
  border-radius: 16px;
  padding: 18px 24px;
  max-width: 500px;
  white-space: pre-line;
  line-height: 1.8;
  color: rgba(255,255,255,0.92);
  text-align: left;
}

/* equation layout */
.equation-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 3vw;
  flex-wrap: wrap;
  margin-bottom: 30px;
}
.eq-arrow { font-size: clamp(32px, 6vw, 64px); font-weight: 900; line-height: 1; }
</style>
</head>

// ── STATE ───────────────────────────────────────────────────────────────────
let currentIdx = 0;
const slideState = {}; // stores per-slide interactive state

function getState(idx) {
  if (!slideState[idx]) slideState[idx] = {};
  return slideState[idx];
}

// ── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  const slide = SLIDES[currentIdx];
  const el = document.getElementById('slide-content');
  el.scrollTop = 0;

  // progress
  const pct = ((currentIdx + 1) / SLIDES.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-fill').style.background = slide.color || '#555';
  document.getElementById('slide-counter').textContent = (currentIdx + 1) + ' / ' + SLIDES.length;

  // dots
  const dots = document.getElementById('dots');
  dots.innerHTML = '';
  SLIDES.forEach((s, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === currentIdx ? ' active' : i < currentIdx ? ' past' : '');
    d.style.background = i === currentIdx ? (s.color || '#555') : i < currentIdx ? '#666' : '#333';
    d.onclick = () => { currentIdx = i; render(); };
    dots.appendChild(d);
  });

  // nav buttons
  const prev = document.getElementById('btn-prev');
  const next = document.getElementById('btn-next');
  prev.disabled = currentIdx === 0;
  next.disabled = currentIdx === SLIDES.length - 1;
  next.style.background = currentIdx === SLIDES.length - 1 ? '#333' : (slide.color || '#555');

  // render slide
  if (slide.type === 'section_title') el.innerHTML = renderSectionTitle(slide);
  else if (slide.type === 'concept') el.innerHTML = renderConcept(slide);
  else if (slide.type === 'equation') el.innerHTML = renderEquation(slide);
  else if (slide.type === 'vocab') el.innerHTML = renderVocab(slide);
  else if (slide.type === 'table') el.innerHTML = renderTable(slide);
  else if (slide.type === 'activity') el.innerHTML = renderActivity(slide);
  else if (slide.type === 'flashcard') el.innerHTML = renderFlashcard(slide);
  else if (slide.type === 'truefalse') el.innerHTML = renderTrueFalse(slide);
  else if (slide.type === 'reveal_list') el.innerHTML = renderRevealList(slide);
  else if (slide.type === 'quiz') el.innerHTML = renderQuiz(slide);
  else el.innerHTML = '';

  attachEvents(slide, currentIdx);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escPre(s) {
  return esc(s).replace(/\n/g,'<br>');
}

// ── SLIDE RENDERERS ─────────────────────────────────────────────────────────

function renderSectionTitle(s) {
  const titleHtml = esc(s.title).replace(/\n/g,'<br>');
  return `<div class="slide-dark" style="background:${s.color};min-height:100%">
    <div class="big" style="color:#fff;white-space:pre-line;margin-bottom:${s.subtitle?'20px':'0'}">${titleHtml}</div>
    ${s.subtitle ? `<div class="subtitle-box body-text">${escPre(s.subtitle)}</div>` : `<div class="section-label" style="margin-top:16px">${esc(s.section)}</div>`}
  </div>`;
}

function renderConcept(s) {
  const exHtml = (s.examples||[]).map(e =>
    `<div class="example-box body-text mono">${escPre(e)}</div>`).join('');
  return `<div class="slide" style="background:#fff">
    <div class="section-label-dark">${esc(s.section)}</div>
    <div class="med" style="color:${s.color};margin-bottom:20px;white-space:pre-line">${esc(s.heading)}</div>
    ${s.body ? `<div class="body-block body-text" style="border-left:6px solid ${s.color}">${escPre(s.body)}</div>` : ''}
    ${exHtml}
  </div>`;
}

function renderEquation(s) {
  return `<div class="slide" style="background:#fff">
    <div class="section-label-dark">${esc(s.section)}</div>
    <div class="med" style="color:${s.color};margin-bottom:28px">${esc(s.heading)}</div>
    <div class="equation-row">
      <div class="big mono" style="color:#222">${esc(s.left)}</div>
      <div class="eq-arrow" style="color:${s.color}">${esc(s.arrow)}</div>
      <div class="big mono" style="color:#222">${esc(s.right)}</div>
    </div>
    ${s.note ? `<div class="note-block body-text" style="border-left:6px solid ${s.color}">${escPre(s.note)}</div>` : ''}
  </div>`;
}

function renderVocab(s) {
  const cards = s.words.map((w,i) => `
    <div class="vocab-card" style="background:${i===0?s.color:'#f0f0f0'}">
      <div class="med" style="color:${i===0?'#fff':s.color};margin-bottom:4px">${esc(w.term)}</div>
      ${w.pron ? `<div class="small-text" style="color:${i===0?'rgba(255,255,255,0.7)':'#888'};font-style:italic;margin-bottom:8px">/${esc(w.pron)}/</div>` : ''}
      <div class="body-text" style="font-weight:700;color:${i===0?'#fff':'#222'};margin-bottom:6px">${esc(w.def)}</div>
      <div class="small-text" style="color:${i===0?'rgba(255,255,255,0.85)':'#555'};white-space:pre-line">${esc(w.detail)}</div>
    </div>`).join('');
  return `<div class="slide" style="background:#fff">
    <div class="section-label-dark">${esc(s.section)}</div>
    <div class="med" style="color:${s.color};margin-bottom:20px">${esc(s.heading)}</div>
    <div class="vocab-row">${cards}</div>
  </div>`;
}

function renderTable(s) {
  const thead = s.headers.map(h=>`<th style="background:${s.color}">${esc(h)}</th>`).join('');
  const tbody = s.rows.map(row=>`<tr>${row.map(cell=>`<td>${escPre(cell)}</td>`).join('')}</tr>`).join('');
  return `<div class="slide" style="background:#fff">
    <div class="section-label-dark">${esc(s.section)}</div>
    <div class="med" style="color:${s.color};margin-bottom:10px">${esc(s.heading)}</div>
    ${s.note ? `<div class="note-block small-text" style="border-left:4px solid ${s.color}">${escPre(s.note)}</div>` : ''}
    <div style="overflow-x:auto;flex:1"><table><thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table></div>
    ${s.footnote ? `<div class="footnote-block small-text" style="border-left:4px solid ${s.color}">${escPre(s.footnote)}</div>` : ''}
  </div>`;
}

function renderActivity(s) {
  const bullets = s.bullets.map(b=>`<div class="bullet-item" style="border-left-color:${s.color}">${esc(b)}</div>`).join('');
  const hasAnswers = s.answers && s.answers.length;
  return `<div class="slide" style="background:#fffef8">
    <div class="section-label-dark">${esc(s.section)}</div>
    <div class="med" style="color:${s.color};margin-bottom:8px">${esc(s.heading)}</div>
    <div class="instruction-text">${esc(s.instruction)}</div>
    ${s.display ? `<div class="display-formula" style="border-color:${s.color}">${esc(s.display)}</div>` : ''}
    <div style="margin-bottom:12px">${bullets}</div>
    ${hasAnswers ? `
      <div id="act-answers-${currentIdx}" style="display:none">
        ${s.answers.map((a,i)=>`<div class="ans-box" id="ans-${i}" style="display:none">✅ ${esc(a)}</div>`).join('')}
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px">
        <button class="ans-reveal-btn" style="background:${s.color}" onclick="revealNextAnswer(${currentIdx})">✅ Next answer</button>
        <button class="ans-reveal-btn" style="background:#888" onclick="hideAnswers(${currentIdx})">↺ Hide</button>
      </div>` : ''}
  </div>`;
}

function renderFlashcard(s) {
  const cards = s.cards.map((c,i)=>`
    <div class="flashcard" id="fc-${i}" onclick="flipCard(${i})">
      <div class="flashcard-front" style="color:${s.color}">${esc(c.front)}</div>
    </div>`).join('');
  return `<div class="slide" style="background:#fff">
    <div class="section-label-dark">${esc(s.section)}</div>
    <div class="med" style="color:${s.color};margin-bottom:8px">${esc(s.heading)}</div>
    <div class="small-text" style="color:#555;margin-bottom:16px;line-height:1.6">${esc(s.intro)}</div>
    <div class="flashcard-grid">${cards}</div>
    <button class="reveal-all-btn" style="background:${s.color}" onclick="flipAllCards()">👁 Reveal all</button>
  </div>`;
}

function renderTrueFalse(s) {
  const cards = s.cards.map((c,i)=>`
    <div class="tf-card" id="tfc-${i}" onclick="revealTF(${i})">
      <div class="tf-card-header">
        <span class="tf-formula" style="color:${s.color}">${esc(c.formula)}</span>
        <span class="tf-claim body-text">= ${esc(c.claim)}</span>
        <span class="tf-icon" id="tfi-${i}">❓</span>
      </div>
      <div class="tf-explain small-text" id="tfe-${i}" style="display:none">${esc(c.explain)}</div>
    </div>`).join('');
  return `<div class="slide" style="background:#fff">
    <div class="section-label-dark">${esc(s.section)}</div>
    <div class="med" style="color:${s.color};margin-bottom:10px">${esc(s.heading)}</div>
    <div class="tf-intro" style="border-left:5px solid ${s.color}">${escPre(s.intro)}</div>
    ${cards}
  </div>`;
}

function renderRevealList(s) {
  const items = s.items.map((item,i)=>`
    <div class="reveal-item" id="ri-${i}" onclick="toggleReveal(${i})">
      <div class="reveal-label" style="color:${s.color}">${escPre(item.label)}</div>
      <div class="tap-hint" id="rh-${i}">tap to reveal</div>
      <div class="reveal-detail" id="rd-${i}" style="display:none">${escPre(item.detail)}</div>
    </div>`).join('');
  return `<div class="slide" style="background:#fff">
    <div class="section-label-dark">${esc(s.section)}</div>
    <div class="med" style="color:${s.color};margin-bottom:16px">${esc(s.heading)}</div>
    ${items}
  </div>`;
}

function renderQuiz(s) {
  const state = getState(currentIdx);
  const questions = s.questions.map((q,qi)=>{
    const answered = state[qi] !== undefined;
    const chosen = state[qi];
    const opts = q.options.map((opt,oi)=>{
      let cls = 'quiz-option';
      if (answered) {
        if (oi === q.correct) cls += ' opt-correct';
        else if (oi === chosen) cls += ' opt-wrong';
      }
      return `<div class="${cls}" onclick="pickAnswer(${qi},${oi})">${esc(opt)}${answered && oi===q.correct?' ✅':''}${answered && oi===chosen && oi!==q.correct?' ❌':''}</div>`;
    }).join('');
    const cardCls = answered ? (chosen===q.correct?'quiz-q answered-correct':'quiz-q answered-wrong') : 'quiz-q';
    const explain = answered ? `<div class="quiz-explain">💡 ${esc(q.explain)}</div>` : '';
    return `<div class="${cardCls}"><div class="quiz-q-text">${esc(q.q)}</div>${opts}${explain}</div>`;
  }).join('');

  const allAnswered = s.questions.every((_,i)=>state[i]!==undefined);
  const score = allAnswered ? s.questions.filter((_,i)=>state[i]===s.questions[i].correct).length : null;
  const scoreHtml = allAnswered ? `<div class="quiz-score ${score===s.questions.length?'perfect':'partial'}">${score===s.questions.length?'🎉 Perfect score!':score+' / '+s.questions.length+' correct'}</div>` : '';

  return `<div class="slide" style="background:#f8faff">
    <div class="section-label-dark">${esc(s.section)}</div>
    <div class="med" style="color:${s.color};margin-bottom:16px">${esc(s.heading)}</div>
    ${questions}
    ${scoreHtml}
  </div>`;
}

// ── EVENT ATTACHMENT ─────────────────────────────────────────────────────────

let fcFlipped = {};
let actAnswerIdx = {};

function attachEvents(slide, idx) {
  fcFlipped = getState(idx).fcFlipped || {};
  actAnswerIdx[idx] = getState(idx).actIdx || 0;

  if (slide.type === 'flashcard') {
    // restore flipped state
    slide.cards.forEach((_,i)=>{
      if (fcFlipped[i]) doFlip(slide, i);
    });
  }
  if (slide.type === 'activity' && slide.answers) {
    const n = getState(idx).actIdx || 0;
    for (let i=0;i<n;i++) {
      const box = document.getElementById('ans-'+i);
      if (box) box.style.display='block';
      const wrap = document.getElementById('act-answers-'+idx);
      if (wrap) wrap.style.display='block';
    }
  }
  if (slide.type === 'reveal_list') {
    const st = getState(idx).revealed || {};
    slide.items.forEach((_,i)=>{
      if (st[i]) doReveal(slide,i);
    });
  }
  if (slide.type === 'truefalse') {
    const st = getState(idx).tfRevealed || {};
    slide.cards.forEach((c,i)=>{
      if (st[i]) doTF(c,i);
    });
  }
}

function flipCard(i) {
  const slide = SLIDES[currentIdx];
  if (!getState(currentIdx).fcFlipped) getState(currentIdx).fcFlipped = {};
  getState(currentIdx).fcFlipped[i] = !getState(currentIdx).fcFlipped[i];
  fcFlipped = getState(currentIdx).fcFlipped;
  if (fcFlipped[i]) doFlip(slide,i);
  else {
    const el = document.getElementById('fc-'+i);
    if (el) { el.classList.remove('flipped'); el.style.background='#f0f0f0'; el.innerHTML=`<div class="flashcard-front" style="color:${slide.color}">${esc(slide.cards[i].front)}</div>`; }
  }
}

function doFlip(slide,i) {
  const el = document.getElementById('fc-'+i);
  if (!el) return;
  el.classList.add('flipped');
  el.style.background = slide.color;
  el.innerHTML = `<div class="flashcard-back">${escPre(slide.cards[i].back)}</div>`;
}

function flipAllCards() {
  const slide = SLIDES[currentIdx];
  if (!getState(currentIdx).fcFlipped) getState(currentIdx).fcFlipped = {};
  const allFlipped = slide.cards.every((_,i)=>getState(currentIdx).fcFlipped[i]);
  slide.cards.forEach((_,i)=>{
    getState(currentIdx).fcFlipped[i] = !allFlipped;
    if (!allFlipped) doFlip(slide,i);
    else {
      const el = document.getElementById('fc-'+i);
      if (el) { el.classList.remove('flipped'); el.style.background='#f0f0f0'; el.innerHTML=`<div class="flashcard-front" style="color:${slide.color}">${esc(slide.cards[i].front)}</div>`; }
    }
  });
}

function revealTF(i) {
  if (!getState(currentIdx).tfRevealed) getState(currentIdx).tfRevealed = {};
  getState(currentIdx).tfRevealed[i] = true;
  doTF(SLIDES[currentIdx].cards[i], i);
}

function doTF(card, i) {
  const wrapper = document.getElementById('tfc-'+i);
  const icon = document.getElementById('tfi-'+i);
  const explain = document.getElementById('tfe-'+i);
  if (!wrapper) return;
  wrapper.classList.add(card.correct ? 'correct' : 'wrong');
  if (icon) icon.textContent = card.correct ? '✅' : '❌';
  if (explain) explain.style.display = 'block';
}

function toggleReveal(i) {
  if (!getState(currentIdx).revealed) getState(currentIdx).revealed = {};
  const open = getState(currentIdx).revealed[i];
  getState(currentIdx).revealed[i] = !open;
  doReveal(SLIDES[currentIdx], i);
}

function doReveal(slide, i) {
  const item = document.getElementById('ri-'+i);
  const detail = document.getElementById('rd-'+i);
  const hint = document.getElementById('rh-'+i);
  if (!item) return;
  const open = getState(currentIdx).revealed[i];
  if (open) {
    item.classList.add('open');
    item.style.background = slide.color;
    if (detail) detail.style.display='block';
    if (hint) hint.style.display='none';
  } else {
    item.classList.remove('open');
    item.style.background = '#f0f0f0';
    if (detail) detail.style.display='none';
    if (hint) hint.style.display='block';
  }
}

function revealNextAnswer(idx) {
  if (!getState(idx).actIdx) getState(idx).actIdx = 0;
  const i = getState(idx).actIdx;
  const wrap = document.getElementById('act-answers-'+idx);
  if (wrap) wrap.style.display='block';
  const box = document.getElementById('ans-'+i);
  if (box) { box.style.display='block'; getState(idx).actIdx = i+1; }
}

function hideAnswers(idx) {
  getState(idx).actIdx = 0;
  const wrap = document.getElementById('act-answers-'+idx);
  if (wrap) wrap.style.display='none';
  let i=0;
  while(true) { const b=document.getElementById('ans-'+i); if(!b)break; b.style.display='none'; i++; }
}

function pickAnswer(qi, oi) {
  const state = getState(currentIdx);
  if (state[qi] !== undefined) return; // already answered
  state[qi] = oi;
  render(); // re-render to show result
}

// ── NAVIGATION ───────────────────────────────────────────────────────────────
document.getElementById('btn-prev').onclick = () => { if (currentIdx > 0) { currentIdx--; render(); } };
document.getElementById('btn-next').onclick = () => { if (currentIdx < SLIDES.length-1) { currentIdx++; render(); } };

// keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { if (currentIdx < SLIDES.length-1) { currentIdx++; render(); } }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { if (currentIdx > 0) { currentIdx--; render(); } }
});

// initial render
render();
</script>
</body>
</html>
